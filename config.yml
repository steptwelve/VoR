# ============================================================
# VoR Daily Meditation — Master Configuration
# ============================================================
# This file controls all production flags and channel settings.
# Edit this file to enable/disable features without touching code.

# ── Video Production ─────────────────────────────────────────
video:
  # Master switch: false = scrape + post to Bluesky/Twitter only
  enabled: true

# ── English Channel ──────────────────────────────────────────
english:
  enabled: true
  youtube_playlist_id: PL8OsToLnGRr_XtJlzH-Md6QmFkkcpuMSl
  youtube_channel_id: UCz0zmpbe_mg8DFEcTmiD8hA
  # Edge TTS voices — rotated daily (male/female alternating)
  voices:
    - en-US-GuyNeural
    - en-US-JennyNeural
    - en-US-ChristopherNeural
    - en-US-AriaNeural
    - en-US-EricNeural
    - en-US-MichelleNeural

# ── Spanish Translation ───────────────────────────────────────
spanish:
  # Master switch: false = no translation, no Spanish video
  enabled: true

  # YouTube destination — choose ONE of:
  #   same_channel: true  → posts to same channel as English, different playlist
  #   same_channel: false → posts to a separate Spanish-language channel
  same_channel: false

  # If same_channel: true — playlist to add Spanish videos to
  youtube_playlist_id:   # e.g. PLxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  # If same_channel: false — separate Spanish channel credentials
  # Store the token as YT_TOKEN_JSON_ES in GitHub Secrets
  youtube_channel_id:    # e.g. UCxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  # Translation settings
  translation:
    # Provider: anthropic (recommended) or deepl
    provider: anthropic
    # Dialect guidance passed to the translation prompt
    # "neutral-international" = no regional slang, broadly understood globally (recommended for ISO)
    # "neutral-latin-american" = broadly understood across US/Mexico/Latin America
    # "mexico" = es-MX, "spain" = es-ES, "us-spanish" = es-US
    dialect: neutral-international
    # Full prompt instruction for translation (edit to taste)
    prompt: >
      Translate the following recovery meditation text to Spanish.
      Use neutral, internationally accessible Spanish with no regional slang,
      idioms, or vocabulary specific to any one country or dialect. The audience
      includes Spanish speakers across Latin America, the United States, Spain,
      and the rest of the world in a recovery context. Use simple, warm, spiritually
      sensitive language. Preserve the first-person voice, the tone of humility
      and hope, and the structure of the original. Do not add explanatory notes,
      translator comments, or any text not present in the original.
      Output only the translated text.

  # Edge TTS voices for Spanish narration — rotated daily
  # Mix of regional voices for broad international appeal
  voices:
    - es-MX-JorgeNeural      # Mexico — neutral, widely understood
    - es-MX-DaliaNeural      # Mexico — neutral, widely understood
    - es-US-AlonsoNeural     # US Spanish — clear and neutral
    - es-US-PalomaNeural     # US Spanish — clear and neutral
    - es-AR-TomasNeural      # Argentina — adds Latin American range
    - es-AR-ElenaNeural      # Argentina — adds Latin American range
